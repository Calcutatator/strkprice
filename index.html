<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strkBTC</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Splash */
  .splash {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 100;
    transition: opacity 1.3s ease;
  }
  .splash span {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #fff;
    opacity: 0.7;
  }
  .splash.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  .loading-dots {
    margin-top: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #fff;
    opacity: 0.4;
  }
  .loading-dots::after {
    content: '.';
    animation: dots 1.5s steps(1, end) infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  main {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 80px 24px 140px;
  }

  .container {
    width: 100%;
    max-width: 980px;
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .container.ready {
    opacity: 1;
    transform: translateY(0);
  }

  .shielded-label {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    opacity: 0.55;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .shielded-label .pct {
    margin-right: 8px;
    opacity: 0.85;
  }

  .price-wrapper {
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .price {
    font-size: clamp(56px, 11vw, 96px);
    font-weight: 200;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .price-suffix {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.18em;
    opacity: 0.55;
  }

  /* Flash colours when total_supply moves */
  .price.flash-up   { color: #22c55e; transition: color 0.8s ease; }
  .price.flash-down { color: #ef4444; transition: color 0.8s ease; }

  .range-pill {
    display: inline-flex;
    align-items: center;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 100px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    letter-spacing: 0.02em;
    margin-bottom: 32px;
  }

  /* Chart */
  .chart-wrapper {
    position: relative;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    aspect-ratio: 16 / 7;
  }
  svg.chart {
    width: 100%;
    height: 100%;
    display: block;
  }
  .gridline {
    stroke: rgba(255,255,255,0.08);
    stroke-width: 1;
  }
  .axis-label {
    fill: rgba(255,255,255,0.4);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.05em;
  }
  .line {
    fill: none;
    stroke: #fff;
    stroke-width: 1.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .area {
    fill: url(#area-grad);
    opacity: 0.5;
  }
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    padding: 0 16px;
  }

  /* Hover inspector */
  .hover-line {
    stroke: rgba(255,255,255,0.25);
    stroke-width: 1;
    stroke-dasharray: 2 4;
    pointer-events: none;
  }
  .hover-dot {
    fill: #fff;
    pointer-events: none;
  }
  .hover-tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 10;
    text-align: center;
    transform: translate(-50%, -100%);
  }
  .hover-tooltip.visible {
    opacity: 1;
  }
  .hover-date {
    color: rgba(255, 255, 255, 0.55);
    font-size: 12px;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .hover-value {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  /* Bottom toggle pill */
  .view-toggle {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 100px;
    color: rgba(255, 255, 255, 0.6);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 50;
  }
  .view-toggle:hover {
    border-color: rgba(255,255,255,0.4);
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.05);
  }
  .view-toggle:active {
    transform: translateX(-50%) scale(0.98);
  }
  .toggle-arrow {
    width: 14px;
    height: 14px;
  }

  body.page-transitioning .container {
    opacity: 0;
    transform: translateY(40px);
  }
  body.page-transitioning .view-toggle {
    opacity: 0;
    transform: translate(-50%, 30px);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="splash" id="splash">
  <span>Shield Everything</span>
  <div class="loading-dots"></div>
</div>

<main>
  <div class="container">
    <div class="shielded-label">
      <span class="pct" id="pct">--</span><span>SHIELDED</span>
    </div>
    <div class="price-wrapper">
      <span class="price" id="price">--</span>
      <span class="price-suffix">BTC</span>
    </div>

    <div class="chart-wrapper">
      <svg class="chart" id="chart" viewBox="0 0 800 350" preserveAspectRatio="none">
        <defs>
          <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line class="hover-line" id="hover-line" style="display:none" />
        <circle class="hover-dot" id="hover-dot" r="4" style="display:none" />
      </svg>
      <div class="empty-state" id="empty-state">Loading snapshots&hellip;</div>
      <div class="hover-tooltip" id="hover-tooltip">
        <div class="hover-date" id="hover-date"></div>
        <div class="hover-value" id="hover-value"></div>
      </div>
    </div>
  </div>
</main>

<a class="view-toggle" href="strk.html">
  <span class="toggle-text">STRK price</span>
  <svg class="toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M7 17L17 7M17 7H7M17 7V17" />
  </svg>
</a>

<script>
// ============================================================================
// strkBTC shielded TVL — reads total_supply() directly from the strkBTC ERC-20
// on Starknet mainnet, then a historical chart from data/strkbtc-tvl.json
// (populated by .github/workflows/snapshot.yml).
// ============================================================================

const STRKBTC_CONTRACT = '0x0787150e306e6eae6e3f79dea881770e8bbff2c1b8eb490f969669ee945b3135';
const POOL_ADDRESS     = '0x040337b1af3c663e86e333bab5a4b28da8d4652a15a69beee2b677776ffe812a';
// Cairo 1 snake_case selectors = starknet_keccak(...)
const TOTAL_SUPPLY_SELECTOR = '0x01557182e4359a1f0c6301278e8f5b35a776ab58d39892581e357578fb287836';
const BALANCE_OF_SELECTOR   = '0x035a73cd311a05d46deda634c5ee045db92f811b4e74bca4437fcb5302b7af33';
const DECIMALS = 8;

// Public Starknet JSON-RPC endpoints. Try in order; first that responds wins.
const RPC_URLS = [
  'https://rpc.starknet.lava.build',
  'https://starknet-mainnet.g.alchemy.com/starknet/version/rpc/v0_7/demo',
  'https://free-rpc.nethermind.io/mainnet-juno'
];

const POLL_INTERVAL_MS = 30_000;
const HISTORY_URL = 'data/strkbtc-tvl.json';

const splash    = document.getElementById('splash');
const container = document.querySelector('.container');
const priceEl   = document.getElementById('price');
const pctEl     = document.getElementById('pct');
const emptyEl   = document.getElementById('empty-state');
const chartEl   = document.getElementById('chart');

let lastBtcValue = null;
let isReady = false;

// ---------------------------------------------------------------------------
// Formatting

function formatBtc(btc) {
  if (!isFinite(btc)) return '--';
  if (btc >= 1000)  return btc.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (btc >= 1)     return btc.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
  if (btc >= 0.001) return btc.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 6 });
  return btc.toLocaleString('en-US', { minimumFractionDigits: 8, maximumFractionDigits: 8 });
}

// pct = shielded strkBTC / wrapped strkBTC * 100 — answers "what fraction of
// strkBTC is currently in the shielded pool?"
function formatPct(shielded, wrapped) {
  if (!wrapped || !isFinite(shielded) || !isFinite(wrapped)) return '0%';
  const pct = (shielded / wrapped) * 100;
  if (pct === 0)     return '0%';
  if (pct >= 1)      return pct.toFixed(2) + '%';
  if (pct >= 0.01)   return pct.toFixed(4) + '%';
  if (pct >= 0.0001) return pct.toFixed(6) + '%';
  return pct.toExponential(2) + '%';
}

// ---------------------------------------------------------------------------
// RPC

async function rpcCall(url, selector, calldata) {
  const body = {
    jsonrpc: '2.0',
    id: 1,
    method: 'starknet_call',
    params: {
      request: {
        contract_address: STRKBTC_CONTRACT,
        entry_point_selector: selector,
        calldata
      },
      block_id: 'latest'
    }
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error.message || 'RPC error');
  return json.result; // [low, high] hex strings
}

function parseU256ToBtc(result) {
  const low  = BigInt(result[0]);
  const high = BigInt(result[1] || '0x0');
  const raw  = (high << 128n) + low;
  // raw fits a Number safely once divided by 1e8.
  return Number(raw) / 10 ** DECIMALS;
}

async function fetchSupplyAndShielded() {
  let lastErr;
  for (const url of RPC_URLS) {
    try {
      const wrappedRes  = await rpcCall(url, TOTAL_SUPPLY_SELECTOR, []);
      const shieldedRes = await rpcCall(url, BALANCE_OF_SELECTOR, [POOL_ADDRESS]);
      return {
        wrapped:  parseU256ToBtc(wrappedRes),
        shielded: parseU256ToBtc(shieldedRes),
      };
    } catch (err) {
      lastErr = err;
      console.warn(`RPC ${url} failed:`, err.message);
    }
  }
  throw lastErr || new Error('All RPCs failed');
}

// ---------------------------------------------------------------------------
// Display

function setDisplayValue(shielded, wrapped) {
  priceEl.textContent = formatBtc(shielded);
  pctEl.textContent   = formatPct(shielded, wrapped);
  document.title      = `${formatBtc(shielded)} BTC shielded · strkBTC`;

  if (lastBtcValue !== null) {
    if (shielded > lastBtcValue + 1e-12) {
      priceEl.classList.remove('flash-down');
      priceEl.classList.add('flash-up');
      setTimeout(() => priceEl.classList.remove('flash-up'), 900);
    } else if (shielded < lastBtcValue - 1e-12) {
      priceEl.classList.remove('flash-up');
      priceEl.classList.add('flash-down');
      setTimeout(() => priceEl.classList.remove('flash-down'), 900);
    }
  }
  lastBtcValue = shielded;
}

function revealUI() {
  if (isReady) return;
  isReady = true;
  if (splash) {
    splash.classList.add('fade-out');
    setTimeout(() => container.classList.add('ready'), 1300);
  } else {
    container.classList.add('ready');
  }
}

// ---------------------------------------------------------------------------
// Chart

async function loadHistory() {
  try {
    const res = await fetch(HISTORY_URL, { cache: 'no-store' });
    if (!res.ok) return [];
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data
      .map(d => ({ t: new Date(d.t).getTime(), btc: Number(d.shielded_btc) }))
      .filter(d => isFinite(d.t) && isFinite(d.btc))
      .sort((a, b) => a.t - b.t);
  } catch (err) {
    console.warn('No history file yet:', err.message);
    return [];
  }
}

let chartState = null;

function renderChart(points, currentBtc) {
  // Always append the live reading so the chart has at least one segment
  // (history + now) even when total_supply hasn't changed since the last
  // snapshot. Same timestamp twice would collapse, but Date.now() advances.
  const series = points.slice();
  if (currentBtc != null) {
    series.push({ t: Date.now(), btc: currentBtc });
  }

  // Clear chart content but keep <defs> and hover elements
  Array.from(chartEl.querySelectorAll('g.layer')).forEach(n => n.remove());

  if (series.length < 2) {
    emptyEl.style.display = 'flex';
    chartState = null;
    return;
  }
  emptyEl.style.display = 'none';

  const W = 800, H = 350;
  const padL = 40, padR = 16, padT = 20, padB = 36;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const ts = series.map(p => p.t);
  const ys = series.map(p => p.btc);
  const minT = Math.min(...ts);
  const maxT = Math.max(...ts);
  const minY = 0;
  const maxY = Math.max(...ys) * 1.15 || 1;

  const x = t => padL + ((t - minT) / Math.max(1, maxT - minT)) * innerW;
  const y = v => padT + (1 - (v - minY) / Math.max(1e-12, maxY - minY)) * innerH;

  const ns = 'http://www.w3.org/2000/svg';
  const layer = document.createElementNS(ns, 'g');
  layer.classList.add('layer');

  // gridlines + y labels (4 rows)
  for (let i = 0; i <= 3; i++) {
    const val = (maxY / 3) * (3 - i);
    const yy  = padT + (innerH / 3) * i;
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', padL); line.setAttribute('x2', W - padR);
    line.setAttribute('y1', yy);   line.setAttribute('y2', yy);
    line.setAttribute('class', 'gridline');
    layer.appendChild(line);

    const label = document.createElementNS(ns, 'text');
    label.setAttribute('x', W - padR);
    label.setAttribute('y', yy - 4);
    label.setAttribute('text-anchor', 'end');
    label.setAttribute('class', 'axis-label');
    label.textContent = formatBtc(val);
    layer.appendChild(label);
  }

  // x-axis date labels (start + end)
  const fmtDate = ts => {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
  const xStart = document.createElementNS(ns, 'text');
  xStart.setAttribute('x', padL);
  xStart.setAttribute('y', H - 12);
  xStart.setAttribute('class', 'axis-label');
  xStart.textContent = fmtDate(minT);
  layer.appendChild(xStart);

  const xEnd = document.createElementNS(ns, 'text');
  xEnd.setAttribute('x', W - padR);
  xEnd.setAttribute('y', H - 12);
  xEnd.setAttribute('text-anchor', 'end');
  xEnd.setAttribute('class', 'axis-label');
  xEnd.textContent = fmtDate(maxT);
  layer.appendChild(xEnd);

  // line path
  const dLine = series.map((p, i) => `${i === 0 ? 'M' : 'L'} ${x(p.t).toFixed(2)} ${y(p.btc).toFixed(2)}`).join(' ');
  const path  = document.createElementNS(ns, 'path');
  path.setAttribute('d', dLine);
  path.setAttribute('class', 'line');
  layer.appendChild(path);

  // area fill under the line
  const dArea = dLine + ` L ${x(series[series.length - 1].t).toFixed(2)} ${y(0).toFixed(2)} L ${x(series[0].t).toFixed(2)} ${y(0).toFixed(2)} Z`;
  const area  = document.createElementNS(ns, 'path');
  area.setAttribute('d', dArea);
  area.setAttribute('class', 'area');
  layer.appendChild(area);

  chartEl.appendChild(layer);

  // Stash for the hover handler (which reads the latest state each mousemove).
  chartState = { series, x, y, W, H, padT, padB };
}

function setupChartHover() {
  const wrapper  = document.querySelector('.chart-wrapper');
  const tooltip  = document.getElementById('hover-tooltip');
  const dateEl   = document.getElementById('hover-date');
  const valueEl  = document.getElementById('hover-value');
  const hLine    = document.getElementById('hover-line');
  const hDot     = document.getElementById('hover-dot');
  if (!wrapper || !tooltip) return;

  const fmtFullDate = ts => new Date(ts).toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric'
  });

  const hide = () => {
    hLine.style.display = 'none';
    hDot.style.display  = 'none';
    tooltip.classList.remove('visible');
  };

  wrapper.addEventListener('mousemove', e => {
    if (!chartState) return;
    const { series, x, y, W, H, padT, padB } = chartState;
    const rect = wrapper.getBoundingClientRect();
    if (rect.width === 0) return;

    // Mouse position in SVG viewBox space
    const svgX = ((e.clientX - rect.left) / rect.width) * W;

    // Nearest data point by SVG-space x distance
    let nearest = 0;
    let minDist = Infinity;
    for (let i = 0; i < series.length; i++) {
      const d = Math.abs(x(series[i].t) - svgX);
      if (d < minDist) { minDist = d; nearest = i; }
    }
    const p  = series[nearest];
    const px = x(p.t);
    const py = y(p.btc);

    hLine.setAttribute('x1', px);
    hLine.setAttribute('x2', px);
    hLine.setAttribute('y1', padT);
    hLine.setAttribute('y2', H - padB);
    hLine.style.display = '';

    hDot.setAttribute('cx', px);
    hDot.setAttribute('cy', py);
    hDot.style.display = '';

    // SVG → CSS pixel coords for HTML tooltip placement
    const htmlX = (px / W) * rect.width;
    const htmlY = (py / H) * rect.height;
    tooltip.style.left = `${htmlX}px`;
    tooltip.style.top  = `${Math.max(htmlY - 16, 30)}px`;

    dateEl.textContent  = fmtFullDate(p.t);
    valueEl.textContent = `${formatBtc(p.btc)} BTC`;
    tooltip.classList.add('visible');
  });

  wrapper.addEventListener('mouseleave', hide);
}

// ---------------------------------------------------------------------------
// Boot

async function tick(history) {
  try {
    const { wrapped, shielded } = await fetchSupplyAndShielded();
    setDisplayValue(shielded, wrapped);
    renderChart(history, shielded);
    revealUI();
  } catch (err) {
    console.error('Failed to fetch strkBTC supply/shielded:', err);
    // Reveal UI anyway so the page doesn't sit on the splash forever
    revealUI();
  }
}

(async function init() {
  const history = await loadHistory();
  await tick(history);
  setupChartHover();
  setInterval(() => tick(history), POLL_INTERVAL_MS);
})();

// Page transition for the toggle pill
const navToggle = document.querySelector('.view-toggle');
if (navToggle) {
  navToggle.addEventListener('click', (event) => {
    const isModifiedClick = event.metaKey || event.ctrlKey || event.shiftKey || event.button !== 0;
    if (isModifiedClick) return;
    event.preventDefault();
    document.body.classList.add('page-transitioning');
    const target = navToggle.getAttribute('href');
    setTimeout(() => { window.location.href = target; }, 400);
  });
}
</script>
</body>
</html>
